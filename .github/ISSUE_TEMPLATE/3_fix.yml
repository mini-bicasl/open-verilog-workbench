name: "Fix: RTL/TB compile or simulation issues"
description: "Fix compile errors, simulation failures, or wrong behavior in your attached RTL/testbench"
title: "[Fix] "
labels: ["bug", "rtl", "testbench", "help wanted"]

body:
  - type: markdown
    attributes:
      value: |
        ### How to use this template

        1. Attach the failing **RTL/testbench files** and any relevant **logs** (compiler output, simulator logs, screenshots of waveforms if helpful).
        2. If GitHub does not accept `.v` / `.sv` files, compress them into a `.zip` or push them to this repo and reference their paths.
        3. Paste the **exact command(s)** you are running (compile + run) and what you expected vs what actually happened.
        4. Copilot/agents will reproduce the problem where possible and propose minimal fixes.
        5. For how Copilot/agents should behave in this repo, see `.github/copilot-instructions.md`.
        6. For testbench expectations (logging, waveforms, reproducibility), see `.github/instructions/TB.md`.
        7. Copilot/agents must keep all reproduction artifacts under `results/issue-<number>/build/` and generate/update `results/issue-<number>/REPORT.md` capturing: what failed, what changed, the exact commands run, and the post-fix results (pass/fail).
        8. For the `REPORT.md` structure expected for Fix issues, see `.github/instructions/REPORT.md`.

  - type: textarea
    id: files
    attributes:
      label: "Attached RTL / TB files and logs"
      description: "Attach the files that are failing plus any logs or waveform screenshots. If files live in this repo, you can list their paths."
      value: |
        For Copilot/agents:

        - Use any attached RTL/testbench files and logs (including `.v`, `.sv`, `.vh`, `.log`, screenshots, or `.zip` archives) and/or the repo paths listed in this field as the single source of truth.
        - If direct `.v`/`.sv` uploads failed with “File type … not supported”, assume the user either attached a `.zip` or provided in-repo paths and read those files instead.
        - Reproduce the failure with the user-provided commands when possible. If commands are missing, infer the minimal `iverilog` + `vvp` flow consistent with this repo and clearly state what you ran.
        - Keep reproduction artifacts under `results/issue-<number>/build/` (do not delete older artifacts for that issue):
          - `compile.log` (command + stdout/stderr),
          - `sim.log` (command + stdout/stderr),
          - waveform outputs (e.g. `*_tb.vcd`) when relevant.
        - Propose **minimal fixes** to RTL/TB that address the root cause (compilation error, assertion failure, wrong behavior), and explain why the change is correct.
        - If you touch testbenches, follow `.github/instructions/TB.md` (self-checking, deterministic, VCD/logs).
        - Create or update `results/issue-<number>/REPORT.md` following `.github/instructions/REPORT.md`, including:
          - the failure summary (what failed and how to reproduce it),
          - the root cause analysis (what was wrong),
          - the fix summary (what changed and why),
          - the exact compile/run commands used,
          - links/paths to `build/compile.log`, `build/sim.log`, and any waveforms,
          - the post-fix outcome (pass/fail) and any remaining known limitations.
        - In your final response, include: what failed, what changed, how to re-run, and where the logs/VCDs are located.
        - Follow the general behavior rules in `.github/copilot-instructions.md`.
    validations:
      required: true
